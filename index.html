<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cueku Store | Katalog Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
        }

        /* LOGIN OVERLAY */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.3s;
        }

        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 380px;
        }

        .login-box h2 {
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .login-box input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1rem;
        }

        .login-box button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        /* HEADER */
        .header {
            background: white;
            border-bottom: 1px solid #f1f5f9;
            padding: 1.2rem 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.85);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .logo h1 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
            color: #0f172a;
        }

        .logo small {
            color: #64748b;
            font-weight: 500;
            font-size: 0.75rem;
        }

        .header-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 0.7rem 1.4rem;
            border-radius: 2.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }

        .btn-outline:hover {
            background: #f1f5f9;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            box-shadow: 0 8px 16px rgba(37, 211, 102, 0.25);
        }

        .btn-dark {
            background: #0f172a;
            color: white;
        }

        /* MAIN GRID */
        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.08);
        }

        .card-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: #f1f5f9;
        }

        .card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h3 {
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .card-body p {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            flex: 1;
        }

        .price {
            font-weight: 800;
            font-size: 1.5rem;
            color: #0f172a;
            margin-bottom: 1.2rem;
        }

        .order-btn {
            background: #25D366;
            color: white;
            padding: 0.9rem;
            border-radius: 1.5rem;
            text-align: center;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        /* ADMIN PANEL */
        .admin-section {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.05);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .tab-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            background: white;
        }

        .tab-btn.active {
            background: #0f172a;
            color: white;
            border-color: #0f172a;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 0.4rem;
            color: #334155;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            background: #f8fafc;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .admin-product-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .admin-item {
            background: #f8fafc;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid #f1f5f9;
        }

        .admin-item img {
            width: 50px;
            height: 50px;
            border-radius: 0.7rem;
            object-fit: cover;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: auto;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- LOGIN OVERLAY (ADMIN) -->
<div id="loginOverlay" class="login-overlay hidden">
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> Admin Access</h2>
        <input type="password" id="adminPassword" placeholder="Masukkan Password" autocomplete="off">
        <button onclick="checkPassword()">Masuk Panel</button>
        <p style="font-size:0.7rem; margin-top:0.8rem; color:#94a3b8;">Default: cueku2020</p>
    </div>
</div>

<header class="header">
    <div class="logo">
        <h1>CUEKU STORE</h1>
        <small>Premium Catalog • Since 2020</small>
    </div>
    <div class="header-btns">
        <button id="adminBtn" class="btn btn-outline" onclick="requestAdmin()"><i class="fas fa-cogs"></i> Admin</button>
        <button id="logoutBtn" class="btn btn-outline hidden" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        <a href="https://wa.me/62895419050123" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> Chat Order</a>
    </div>
</header>

<main class="container">
    <div id="productContainer" class="product-grid"></div>

    <!-- ADMIN SECTION (hidden by default) -->
    <div id="adminSection" class="admin-section hidden">
        <div class="admin-header">
            <h2><i class="fas fa-toolbox"></i> Manajemen Produk</h2>
        </div>
        
        <div class="tab-btns">
            <button class="tab-btn active" onclick="switchTab('upload')">Upload Gambar</button>
            <button class="tab-btn" onclick="switchTab('url')">Gunakan URL Gambar</button>
        </div>

        <div id="tabUpload" class="tab-content">
            <div class="grid-2">
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="pName" class="form-control" placeholder="Nama produk">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="pPrice" class="form-control" placeholder="150000">
                </div>
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="pDesc" class="form-control" rows="2" placeholder="Deskripsi singkat"></textarea>
            </div>
            <div class="form-group">
                <label>Upload Gambar (dari device)</label>
                <input type="file" id="imageFile" accept="image/*" style="display:none;">
                <button class="btn btn-outline" onclick="document.getElementById('imageFile').click()"><i class="fas fa-camera"></i> Pilih File</button>
                <img id="imgPreview" style="width:80px; height:80px; object-fit:cover; border-radius:1rem; margin-top:10px; display:none;">
            </div>
        </div>

        <div id="tabUrl" class="tab-content hidden">
            <div class="grid-2">
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="pNameUrl" class="form-control" placeholder="Nama produk">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="pPriceUrl" class="form-control" placeholder="150000">
                </div>
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="pDescUrl" class="form-control" rows="2" placeholder="Deskripsi singkat"></textarea>
            </div>
            <div class="form-group">
                <label>URL Gambar (rekomendasi buat kualitas HD)</label>
                <input type="text" id="pImageUrl" class="form-control" placeholder="https://i.imgur.com/....jpg">
                <small>Upload dulu ke <a href="https://imgbb.com" target="_blank">imgbb.com</a> atau Imgur, lalu copy link-nya di sini.</small>
            </div>
        </div>

        <button class="btn btn-dark" onclick="addProduct()"><i class="fas fa-plus"></i> Tambah ke Katalog</button>
        
        <div style="margin-top: 2rem;">
            <h3>Daftar Produk Aktif</h3>
            <div id="adminProductList" class="admin-product-list"></div>
        </div>
    </div>
</main>

<footer>
    &copy; 2020 Cueku Store. All rights reserved. | Order via WhatsApp
</footer>

<script>
    (function() {
        const STORAGE_KEY = 'cueku_catalog';
        const ADMIN_PASS = 'cueku2020';
        const WA_NUMBER = '62895419050123';
        
        let products = [];
        let isAdmin = false;
        let selectedImageBase64 = null;

        // DOM
        const loginOverlay = document.getElementById('loginOverlay');
        const adminSection = document.getElementById('adminSection');
        const adminBtn = document.getElementById('adminBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const productContainer = document.getElementById('productContainer');

        // Load data
        function loadProducts() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { products = JSON.parse(stored); } catch(e) { products = []; }
            } else {
                products = [
                    { id: Date.now()+1, name:'Tas Ransel Vintage', price:450000, desc:'Kulit asli premium.', image:'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=600' },
                    { id: Date.now()+2, name:'Sneakers White Edition', price:320000, desc:'Kanvas nyaman size 38-43.', image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600' }
                ];
                saveProducts();
            }
        }

        function saveProducts() { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); }

        function renderCatalog() {
            if (!productContainer) return;
            if (products.length === 0) {
                productContainer.innerHTML = `<div class="empty-state" style="grid-column:1/-1;text-align:center;padding:4rem;">✨ Katalog kosong.</div>`;
                return;
            }
            let html = '';
            products.forEach(p => {
                const price = new Intl.NumberFormat('id-ID').format(p.price);
                const waText = `Halo Cueku Store, saya minat *${p.name}* (Rp${price}). Masih ada?`;
                html += `
                <div class="card">
                    <img src="${p.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400/f1f5f9/94a3b8?text=No+Image'">
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <p>${p.desc || 'Produk berkualitas.'}</p>
                        <div class="price">Rp${price}</div>
                        <a href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waText)}" target="_blank" class="order-btn">
                            <i class="fab fa-whatsapp"></i> Order via WhatsApp
                        </a>
                    </div>
                </div>`;
            });
            productContainer.innerHTML = html;
        }

        function renderAdminList() {
            const list = document.getElementById('adminProductList');
            if (!list) return;
            if (products.length === 0) { list.innerHTML = '<p style="color:#64748b;">Tidak ada produk.</p>'; return; }
            let items = '';
            products.forEach(p => {
                items += `
                <div class="admin-item">
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/50'">
                    <div><strong>${p.name}</strong> - Rp${new Intl.NumberFormat('id-ID').format(p.price)}</div>
                    <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                </div>`;
            });
            list.innerHTML = items;
        }

        window.deleteProduct = function(id) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderCatalog();
            renderAdminList();
        };

        // ADMIN AUTH
        window.requestAdmin = function() {
            if (isAdmin) {
                adminSection.classList.toggle('hidden');
            } else {
                loginOverlay.classList.remove('hidden');
                document.getElementById('adminPassword').value = '';
            }
        };

        window.checkPassword = function() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASS) {
                isAdmin = true;
                loginOverlay.classList.add('hidden');
                adminSection.classList.remove('hidden');
                adminBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                renderAdminList();
            } else {
                alert('Password salah!');
            }
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            adminSection.classList.add('hidden');
            adminBtn.classList.remove('hidden');
            logoutBtn.classList.add('hidden');
        };

        // Image Upload Handler
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                selectedImageBase64 = ev.target.result;
                const preview = document.getElementById('imgPreview');
                preview.src = selectedImageBase64;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        // Tab Switching
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            if (tab === 'upload') {
                document.getElementById('tabUpload').classList.remove('hidden');
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            } else {
                document.getElementById('tabUrl').classList.remove('hidden');
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            }
        };

        // Add Product Logic
        window.addProduct = function() {
            const activeTab = document.getElementById('tabUpload').classList.contains('hidden') ? 'url' : 'upload';
            let name, price, desc, image;

            if (activeTab === 'upload') {
                name = document.getElementById('pName').value.trim();
                price = parseInt(document.getElementById('pPrice').value);
                desc = document.getElementById('pDesc').value.trim();
                image = selectedImageBase64;
                if (!name || !price || !image) { alert('Isi semua field dan upload gambar!'); return; }
                // Reset upload form
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pDesc').value = '';
                document.getElementById('imageFile').value = '';
                document.getElementById('imgPreview').style.display = 'none';
                selectedImageBase64 = null;
            } else {
                name = document.getElementById('pNameUrl').value.trim();
                price = parseInt(document.getElementById('pPriceUrl').value);
                desc = document.getElementById('pDescUrl').value.trim();
                image = document.getElementById('pImageUrl').value.trim();
                if (!name || !price || !image) { alert('Isi semua field termasuk URL gambar!'); return; }
                // Reset url form
                document.getElementById('pNameUrl').value = '';
                document.getElementById('pPriceUrl').value = '';
                document.getElementById('pDescUrl').value = '';
                document.getElementById('pImageUrl').value = '';
            }

            const newProd = {
                id: Date.now(),
                name: name,
                price: price,
                desc: desc,
                image: image
            };
            products.push(newProd);
            saveProducts();
            renderCatalog();
            renderAdminList();
        };

        // Init
        loadProducts();
        renderCatalog();
    })();
</script>
</body>
</html>
