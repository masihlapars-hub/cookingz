<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cueku Store | Katalog Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }
        .header {
            position: sticky; top:0; z-index:100;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            flex-wrap: wrap; gap: 1rem;
        }
        .logo h1 { font-weight:800; font-size:1.9rem; letter-spacing:-1px; background:linear-gradient(135deg,#0f172a,#475569); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .logo span { font-size:0.7rem; color:#64748b; font-weight:500; }
        .btn {
            padding:0.65rem 1.4rem; border-radius:2.5rem; font-weight:600; cursor:pointer; border:none;
            display:inline-flex; align-items:center; gap:6px; transition:all 0.25s; text-decoration:none; font-size:0.9rem;
        }
        .btn-outline { background:white; border:1px solid #e2e8f0; color:#1e293b; }
        .btn-outline:hover { background:#f1f5f9; }
        .btn-primary { background:#0f172a; color:white; box-shadow:0 8px 18px rgba(15,23,42,0.15); }
        .btn-primary:hover { background:#1e293b; transform:translateY(-1px); }
        .btn-wa { background:#25D366; color:white; box-shadow:0 8px 16px rgba(37,211,102,0.25); }
        .btn-wa:hover { background:#1da851; }
        .container { max-width:1300px; margin:2rem auto; padding:0 1.5rem; }
        .product-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap:2rem; margin-top:1rem; }
        .card {
            background:white; border-radius:2rem; overflow:hidden;
            box-shadow:0 20px 35px rgba(0,0,0,0.04), 0 8px 16px rgba(0,0,0,0.02);
            transition:all 0.3s ease; border:1px solid rgba(0,0,0,0.02);
        }
        .card:hover { transform:translateY(-6px); box-shadow:0 28px 45px rgba(0,0,0,0.08); }
        .card-img { width:100%; height:250px; object-fit:cover; background:#f1f5f9; }
        .card-body { padding:1.5rem; display:flex; flex-direction:column; }
        .card-body h3 { font-weight:700; font-size:1.3rem; margin-bottom:0.4rem; }
        .card-body p { color:#475569; font-size:0.9rem; line-height:1.5; margin-bottom:1rem; flex:1; }
        .price { font-weight:800; font-size:1.6rem; color:#0f172a; margin-bottom:1rem; }
        .order-btn {
            background:#25D366; color:white; padding:0.85rem; border-radius:2rem;
            text-align:center; font-weight:700; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px;
            transition:0.2s; box-shadow:0 6px 12px rgba(37,211,102,0.25);
        }
        .order-btn:hover { background:#1da851; }
        .admin-section {
            margin-top:2rem; background:white; border-radius:2rem; padding:2rem;
            box-shadow:0 20px 35px rgba(0,0,0,0.05); display:none;
        }
        .admin-section.active { display:block; }
        .form-group { margin-bottom:1.2rem; }
        .form-group label { font-weight:600; font-size:0.9rem; display:block; margin-bottom:0.4rem; color:#334155; }
        .form-control { width:100%; padding:0.9rem; border:1px solid #e2e8f0; border-radius:1rem; background:#f8fafc; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .preview-img { width:80px; height:80px; object-fit:cover; border-radius:1rem; margin-top:0.5rem; border:2px dashed #cbd5e1; display:none; }
        .admin-product-list { display:flex; flex-wrap:wrap; gap:1rem; margin-top:1.5rem; }
        .product-chip { background:#f1f5f9; padding:0.6rem 1.2rem; border-radius:2rem; display:flex; align-items:center; gap:0.8rem; }
        .product-chip img { width:40px; height:40px; border-radius:0.7rem; object-fit:cover; }
        .btn-delete { background:none; border:none; color:#ef4444; cursor:pointer; font-size:1.1rem; }
        .login-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; z-index:999; }
        .login-box { background:white; padding:2.5rem; border-radius:2.5rem; text-align:center; width:90%; max-width:360px; }
        .hidden { display:none !important; }
        footer { text-align:center; padding:2rem; color:#64748b; margin-top:2rem; }
        @media(max-width:640px){ .grid-2{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay hidden">
        <div class="login-box">
            <h3>🔐 Admin</h3>
            <input type="password" id="passInput" class="form-control" placeholder="Password" autocomplete="off">
            <button class="btn btn-primary" onclick="login()" style="width:100%;justify-content:center;margin-top:0.5rem;">Masuk</button>
            <small style="color:#94a3b8;">default: cueku2020</small>
        </div>
    </div>

    <header class="header">
        <div class="logo">
            <h1>CUEKU STORE</h1>
            <span>Premium Catalog • Since 2020</span>
        </div>
        <div style="display:flex; gap:0.6rem; align-items:center;">
            <button id="adminBtn" class="btn btn-outline" onclick="toggleAdmin()"><i class="fas fa-cogs"></i> Admin</button>
            <button id="logoutBtn" class="btn btn-outline hidden" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Tutup</button>
            <a href="https://wa.me/62895419050123" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> Chat</a>
        </div>
    </header>

    <main class="container">
        <div id="productGrid" class="product-grid"></div>

        <div id="adminPanel" class="admin-section">
            <h2 style="margin-bottom:1.8rem; font-weight:700;">➕ Tambah Produk</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" id="pName" class="form-control" placeholder="Nama produk">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="pPrice" class="form-control" placeholder="150000">
                </div>
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="pDesc" class="form-control" rows="2" placeholder="Deskripsi singkat"></textarea>
            </div>
            <div class="form-group">
                <label>Upload Gambar (dari HP/PC) - <strong>Wajib</strong></label>
                <input type="file" id="imageFile" accept="image/*" style="display:none;">
                <button class="btn btn-outline" onclick="document.getElementById('imageFile').click()"><i class="fas fa-camera"></i> Pilih Gambar</button>
                <img id="imgPreview" class="preview-img" alt="preview">
                <small style="display:block; margin-top:0.3rem; color:#64748b;">Atau pakai URL gambar di bawah (opsional)</small>
            </div>
            <div class="form-group">
                <label>URL Gambar (opsional, kalau gak upload file)</label>
                <input type="text" id="pImageUrl" class="form-control" placeholder="https://i.imgur.com/....jpg">
            </div>
            <button class="btn btn-primary" onclick="addProduct()"><i class="fas fa-save"></i> Simpan Produk</button>
            <div style="margin-top:2rem;">
                <h4>📦 Produk Aktif</h4>
                <div id="adminProductList" class="admin-product-list"></div>
            </div>
        </div>
    </main>

    <footer>&copy; 2020 Cueku Store. All rights reserved.</footer>

    <script>
        (function() {
            const STORAGE = 'cueku_final_catalog';
            const PASS = 'cueku2020';
            const WA = '62895419050123';

            let products = [];
            let isAdmin = false;
            let selectedImageData = null; // base64

            // Load
            function load() {
                const s = localStorage.getItem(STORAGE);
                if (s) { try { products = JSON.parse(s); } catch(e) { products = []; } }
                else {
                    products = [
                        { id: Date.now()+1, name:'Tas Vintage', price:450000, desc:'Kulit asli.', image:'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=600' },
                        { id: Date.now()+2, name:'Sneakers Putih', price:320000, desc:'Kanvas premium.', image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600' }
                    ];
                    save();
                }
            }
            function save() { localStorage.setItem(STORAGE, JSON.stringify(products)); }

            function renderCatalog() {
                const grid = document.getElementById('productGrid');
                if (!grid) return;
                if (products.length===0) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#64748b;">Belum ada produk.</div>';
                    return;
                }
                let h = '';
                products.forEach(p => {
                    const price = new Intl.NumberFormat('id-ID').format(p.price);
                    const msg = `Halo Cueku Store, minat ${p.name} (Rp${price}). Ready?`;
                    h += `
                    <div class="card">
                        <img src="${p.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/f1f5f9/94a3b8?text=No+Image'">
                        <div class="card-body">
                            <h3>${p.name}</h3>
                            <p>${p.desc||'Produk berkualitas.'}</p>
                            <div class="price">Rp${price}</div>
                            <a href="https://wa.me/${WA}?text=${encodeURIComponent(msg)}" target="_blank" class="order-btn"><i class="fab fa-whatsapp"></i> Order via WhatsApp</a>
                        </div>
                    </div>`;
                });
                grid.innerHTML = h;
            }

            function renderAdminList() {
                const list = document.getElementById('adminProductList');
                if (!list) return;
                if (products.length===0) { list.innerHTML = '<p style="color:#64748b;">Tidak ada produk.</p>'; return; }
                let chips = '';
                products.forEach(p => {
                    chips += `
                    <div class="product-chip">
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/40'">
                        <span><strong>${p.name}</strong> - Rp${new Intl.NumberFormat('id-ID').format(p.price)}</span>
                        <button class="btn-delete" onclick="deleteProduct(${p.id})"><i class="fas fa-times-circle"></i></button>
                    </div>`;
                });
                list.innerHTML = chips;
            }

            window.deleteProduct = function(id) {
                products = products.filter(p => p.id !== id);
                save(); renderCatalog(); renderAdminList();
            };

            // Upload preview + compress
            document.getElementById('imageFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = function() {
                        // Kompresi: max 800px lebar, kualitas 0.7
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const maxW = 800;
                        if (w > maxW) { h *= maxW / w; w = maxW; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        selectedImageData = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('imgPreview').src = selectedImageData;
                        document.getElementById('imgPreview').style.display = 'block';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            window.addProduct = function() {
                const name = document.getElementById('pName').value.trim();
                const price = parseInt(document.getElementById('pPrice').value);
                const desc = document.getElementById('pDesc').value.trim();
                const url = document.getElementById('pImageUrl').value.trim();

                let image = null;
                if (selectedImageData) {
                    image = selectedImageData;
                } else if (url) {
                    image = url;
                } else {
                    alert('Harap upload gambar atau isi URL gambar!');
                    return;
                }

                if (!name || isNaN(price) || price <= 0) {
                    alert('Nama dan harga valid harus diisi.');
                    return;
                }

                products.push({ id: Date.now(), name, price, desc, image });
                save();
                // Reset form
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pDesc').value = '';
                document.getElementById('imageFile').value = '';
                document.getElementById('pImageUrl').value = '';
                document.getElementById('imgPreview').style.display = 'none';
                selectedImageData = null;
                renderCatalog();
                renderAdminList();
                alert('Produk berhasil ditambahkan!');
            };

            // Admin auth
            window.toggleAdmin = function() {
                if (isAdmin) {
                    document.getElementById('adminPanel').classList.toggle('active');
                } else {
                    document.getElementById('loginOverlay').classList.remove('hidden');
                }
            };
            window.login = function() {
                if (document.getElementById('passInput').value === PASS) {
                    isAdmin = true;
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminBtn').classList.add('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    renderAdminList();
                } else { alert('Password salah!'); }
            };
            window.logout = function() {
                isAdmin = false;
                document.getElementById('adminPanel').classList.remove('active');
                document.getElementById('adminBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
            };

            load(); renderCatalog();
        })();
    </script>
</body>
</html>
