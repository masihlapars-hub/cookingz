<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cueku Store | Premium Katalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #eaeaea;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        /* Dynamic gradient background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 10%, rgba(138, 43, 226, 0.25) 0%, transparent 45%),
                        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(30, 144, 255, 0.1) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 18, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
            padding: 1rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo h1 {
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #d4af37 0%, #f9e076 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
        }

        .logo span {
            font-size: 0.7rem;
            color: #aa9b7a;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%);
            color: white;
            box-shadow: 0 12px 25px rgba(138, 43, 226, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #9b59b6 0%, #7d3c98 100%);
            transform: translateY(-3px);
            box-shadow: 0 20px 35px rgba(138, 43, 226, 0.6);
        }

        .btn-wa {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.45);
        }

        .btn-wa:hover {
            filter: brightness(1.1);
            transform: translateY(-3px);
            box-shadow: 0 22px 35px rgba(37, 211, 102, 0.6);
        }

        .container {
            max-width: 1360px;
            margin: 2.5rem auto;
            padding: 0 2.5rem;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-top: 1rem;
        }

        .card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 2.5rem;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 30px 45px rgba(0,0,0,0.5), 0 0 0 0 rgba(212, 175, 55, 0.15);
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(212, 175, 55, 0.7);
            box-shadow: 0 45px 60px rgba(0,0,0,0.6), 0 0 25px rgba(212, 175, 55, 0.3);
        }

        .card-img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            background: #1a1a2e;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .card:hover .card-img {
            transform: scale(1.06);
        }

        .card-body {
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
        }

        .card-body h3 {
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 0.4rem;
            color: #f5e7c6;
            letter-spacing: -0.3px;
        }

        .card-body p {
            color: #b0a58a;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
            flex: 1;
        }

        .price {
            font-weight: 800;
            font-size: 1.8rem;
            color: #d4af37;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .price span {
            font-size: 0.8rem;
            font-weight: 500;
            color: #aa9b7a;
        }

        .order-btn {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            padding: 0.9rem;
            border-radius: 2.5rem;
            text-align: center;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 14px 24px rgba(37, 211, 102, 0.4);
            letter-spacing: -0.2px;
        }

        .order-btn:hover {
            filter: brightness(1.05);
            box-shadow: 0 20px 30px rgba(37, 211, 102, 0.6);
            transform: translateY(-2px);
        }

        /* Admin Panel */
        .admin-section {
            margin-top: 2.5rem;
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 3rem;
            padding: 2.8rem;
            box-shadow: 0 35px 55px rgba(0,0,0,0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: none;
            transition: 0.3s;
        }

        .admin-section.active {
            display: block;
            animation: fadeSlide 0.5s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-title {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #d4af37;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.4rem;
            margin-bottom: 1.4rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #c0b28a;
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1.3rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 1.3rem;
            background: rgba(10, 10, 15, 0.7);
            color: #f0e6c5;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(20, 20, 30, 0.9);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .preview-img {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 1.2rem;
            margin-top: 0.8rem;
            border: 2px dashed rgba(212, 175, 55, 0.5);
            display: none;
        }

        .product-list-mini {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 2rem;
        }

        .product-chip {
            background: rgba(20, 20, 30, 0.8);
            padding: 0.7rem 1.4rem;
            border-radius: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .product-chip img {
            width: 42px;
            height: 42px;
            border-radius: 0.9rem;
            object-fit: cover;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.2s;
            margin-left: 0.5rem;
            opacity: 0.8;
        }

        .btn-delete:hover {
            opacity: 1;
            transform: scale(1.15);
            color: #ff4444;
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .login-box {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(25px);
            padding: 3.5rem;
            border-radius: 3rem;
            text-align: center;
            width: 90%;
            max-width: 390px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 30px rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .login-box h3 {
            font-weight: 700;
            margin-bottom: 1.8rem;
            font-size: 1.6rem;
            color: #d4af37;
        }

        .hidden {
            display: none !important;
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            color: #8a8972;
            font-size: 0.85rem;
            margin-top: 3rem;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
        }

        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
            .header { padding: 1rem 1.5rem; }
            .container { padding: 0 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-overlay hidden" id="loginOverlay">
        <div class="login-box">
            <h3>🔐 Admin Access</h3>
            <input type="password" id="passInput" class="form-control" placeholder="Kata sandi" autocomplete="off">
            <button class="btn btn-primary" onclick="login()" style="width:100%; justify-content:center; margin-top:1.2rem;">Masuk</button>
        </div>
    </div>

    <header class="header">
        <div class="logo">
            <h1>CUEKU STORE</h1>
            <span>LUXURY CATALOG · EST 2020</span>
        </div>
        <div style="display:flex; gap:0.6rem; align-items:center;">
            <button id="adminBtn" class="btn btn-outline" onclick="toggleAdmin()"><i class="fas fa-crown"></i> Admin</button>
            <button id="logoutBtn" class="btn btn-outline hidden" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Tutup</button>
            <a href="https://wa.me/62895419050123" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> Chat Order</a>
        </div>
    </header>

    <main class="container">
        <div id="productGrid" class="product-grid"></div>

        <div id="adminPanel" class="admin-section">
            <h2 class="admin-title">✨ Tambah Produk Eksklusif</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" id="pName" class="form-control" placeholder="Nama produk">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="pPrice" class="form-control" placeholder="150000">
                </div>
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="pDesc" class="form-control" rows="2" placeholder="Detail produk..."></textarea>
            </div>
            <div class="form-group">
                <label>Upload Gambar</label>
                <input type="file" id="imageFile" accept="image/*" style="display:none;">
                <button class="btn btn-outline" onclick="document.getElementById('imageFile').click()"><i class="fas fa-camera-retro"></i> Pilih dari Galeri</button>
                <img id="imgPreview" class="preview-img" alt="preview">
            </div>
            <div class="form-group">
                <label>Atau URL Gambar (HD)</label>
                <input type="text" id="pImageUrl" class="form-control" placeholder="https://i.imgur.com/...jpg">
            </div>
            <button class="btn btn-primary" onclick="addProduct()"><i class="fas fa-plus-circle"></i> Simpan</button>
            <div style="margin-top:2.5rem;">
                <h4 style="font-weight:700; margin-bottom:1rem; color:#d4af37;">📦 Produk Tersimpan</h4>
                <div id="adminProductList" class="product-list-mini"></div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2020 Cueku Store. All rights reserved. | Luxury Goods
    </footer>

    <script>
        (function() {
            const STORAGE_KEY = 'cueku_luxury_v4';
            const ADMIN_PASS = 'cueku2020';
            const WA_NUMBER = '62895419050123';

            let products = [];
            let isAdmin = false;
            let selectedImageData = null;

            function loadProducts() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try { products = JSON.parse(stored); } catch(e) { products = []; }
                } else {
                    products = [
                        { id: Date.now()+1, name: 'Tas Kulit Vintage', price: 450000, desc: 'Kulit asli premium.', image: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=600' },
                        { id: Date.now()+2, name: 'Sneakers Eksklusif', price: 320000, desc: 'Desain limited edition.', image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600' }
                    ];
                    saveProducts();
                }
            }

            function saveProducts() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            }

            function renderCatalog() {
                const grid = document.getElementById('productGrid');
                if (!grid) return;
                if (products.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem;color:#8a8972;">Belum ada produk eksklusif.</div>';
                    return;
                }
                let html = '';
                products.forEach(p => {
                    const price = new Intl.NumberFormat('id-ID').format(p.price);
                    const waMsg = `Halo Cueku Store, saya minat *${p.name}* (Rp${price}). Ready?`;
                    html += `
                    <div class="card">
                        <img src="${p.image}" class="card-img" loading="lazy" onerror="this.src='https://via.placeholder.com/400x270/1a1a2e/d4af37?text=No+Image'">
                        <div class="card-body">
                            <h3>${p.name}</h3>
                            <p>${p.desc || 'Produk eksklusif.'}</p>
                            <div class="price">Rp${price}</div>
                            <a href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waMsg)}" target="_blank" class="order-btn">
                                <i class="fab fa-whatsapp"></i> Order via WhatsApp
                            </a>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html;
            }

            function renderAdminList() {
                const list = document.getElementById('adminProductList');
                if (!list) return;
                if (products.length === 0) {
                    list.innerHTML = '<p style="color:#8a8972;">Tidak ada produk.</p>';
                    return;
                }
                let chips = '';
                products.forEach(p => {
                    chips += `
                    <div class="product-chip">
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/42'">
                        <span style="color:#f0e6c5;"><strong>${p.name}</strong> · Rp${new Intl.NumberFormat('id-ID').format(p.price)}</span>
                        <button class="btn-delete" onclick="deleteProduct(${p.id})"><i class="fas fa-times-circle"></i></button>
                    </div>`;
                });
                list.innerHTML = chips;
            }

            window.deleteProduct = function(id) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderCatalog();
                renderAdminList();
            };

            document.getElementById('imageFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const maxW = 800;
                        if (w > maxW) { h *= maxW / w; w = maxW; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        selectedImageData = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('imgPreview').src = selectedImageData;
                        document.getElementById('imgPreview').style.display = 'block';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            window.addProduct = function() {
                const name = document.getElementById('pName').value.trim();
                const price = parseInt(document.getElementById('pPrice').value);
                const desc = document.getElementById('pDesc').value.trim();
                const url = document.getElementById('pImageUrl').value.trim();

                if (!name || isNaN(price) || price <= 0) {
                    alert('Nama dan harga wajib diisi.');
                    return;
                }
                let image = null;
                if (selectedImageData) image = selectedImageData;
                else if (url) image = url;
                else { alert('Upload gambar atau isi URL.'); return; }

                products.push({ id: Date.now(), name, price, desc, image });
                saveProducts();

                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pDesc').value = '';
                document.getElementById('imageFile').value = '';
                document.getElementById('pImageUrl').value = '';
                document.getElementById('imgPreview').style.display = 'none';
                selectedImageData = null;

                renderCatalog();
                renderAdminList();
                alert('Produk berhasil ditambahkan!');
            };

            window.toggleAdmin = function() {
                if (isAdmin) {
                    document.getElementById('adminPanel').classList.toggle('active');
                } else {
                    document.getElementById('loginOverlay').classList.remove('hidden');
                    document.getElementById('passInput').value = '';
                    document.getElementById('passInput').focus();
                }
            };

            window.login = function() {
                if (document.getElementById('passInput').value === ADMIN_PASS) {
                    isAdmin = true;
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminBtn').classList.add('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    renderAdminList();
                } else {
                    alert('Password salah!');
                }
            };

            window.logout = function() {
                isAdmin = false;
                document.getElementById('adminPanel').classList.remove('active');
                document.getElementById('adminBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
            };

            loadProducts();
            renderCatalog();
        })();
    </script>
</body>
</html>
